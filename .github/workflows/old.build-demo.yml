name: Build and Publish Demo App

on:
  push:
    branches:
      - main
      - feature/*

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | \
        docker login ghcr.io \
        -u ${{ github.actor }} \
        --password-stdin

    - name: Set Image Tag
      run: |
       echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Set lowercase owner
      run: |
        echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build Image
      run: |
        docker build \
        -t ghcr.io/${OWNER_LC}/demo-app:${IMAGE_TAG} \
        images/demo-app

    - name: Push Image
      run: |
        docker push \
           ghcr.io/${OWNER_LC}/demo-app:${IMAGE_TAG}

    - name: Verify
      run: |
        docker images
