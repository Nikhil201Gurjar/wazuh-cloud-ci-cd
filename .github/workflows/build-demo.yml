name: Build and Publish Demo App

on:
  push:
    branches:
      - main
      - feature/*

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | \
        docker login ghcr.io \
        -u ${{ github.actor }} \
        --password-stdin

    - name: Build Image
      run: |
        docker build \
          -t ghcr.io/${{ github.repository_owner }}/demo-app:latest \
          images/demo-app

    - name: Push Image
      run: |
        docker push \
          ghcr.io/${{ github.repository_owner }}/demo-app:latest

    - name: Verify
      run: |
        docker images
